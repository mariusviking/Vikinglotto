<!doctype html><html lang="lt"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vikinglotto PRO V5 iPhone</title><style>body{font-family:-apple-system,Arial;background:#f3f5f8;margin:0;padding:16px;color:#111}.card{background:white;padding:16px;border-radius:14px;margin-bottom:14px}textarea{width:100%;min-height:300px;font-size:16px;padding:10px;box-sizing:border-box}button{font-size:17px;padding:13px 16px;border:0;border-radius:10px;background:#0a66c2;color:white;margin:8px 6px 8px 0}.secondary{background:#555}.status{white-space:pre-wrap;padding:12px;border-radius:10px;background:#fff3cd;font-weight:600}.ok{background:#d9f5df}.err{background:#ffd9d9}table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #ddd;padding:5px;text-align:center}.scroll{overflow:auto}</style></head><body>
<div class="card"><h2>Vikinglotto PRO V5 – iPhone testas</h2><div id="status" class="status">JavaScript dar nepasileido. Jeigu šis tekstas nepasikeičia į žalią, failas atidarytas per peržiūrą, kuri nevykdo programos.</div></div>
<div class="card"><textarea id="src" placeholder="Įklijuok tekstą čia"></textarea><br><button id="cleanBtn">VALYTI IR ĮKELTI</button><button id="clearBtn" class="secondary">Išvalyti langą</button></div>
<div class="card"><div id="result"></div></div>
<script>
(function(){
'use strict';
var status=document.getElementById('status'),src=document.getElementById('src'),result=document.getElementById('result');
function setStatus(t,c){status.textContent=t;status.className='status '+(c||'');}
setStatus('Programa paleista sėkmingai. Dabar įklijuok tekstą ir spausk VALYTI IR ĮKELTI.','ok');
function splitExact(digits,count){digits=String(digits).replace(/\D/g,'');var out=[];function rec(pos,a){if(a.length===count){if(pos===digits.length)out.push(a.slice());return;}var left=count-a.length,remain=digits.length-pos;if(remain<left||remain>left*2)return;for(var len=1;len<=2&&pos+len<=digits.length;len++){if(len===2&&digits.charAt(pos)==='0')continue;var n=Number(digits.slice(pos,pos+len));if(n<1||n>48||a.indexOf(n)>=0)continue;a.push(n);rec(pos+len,a);a.pop();}}rec(0,[]);return out;}
function field(body,label,next){var re=new RegExp(label+'\\s*:?\\s*([\\s\\S]*?)(?='+next.join('|')+'|$)','i'),m=body.match(re);return m?m[1].trim():'';}
function parse(text){text=String(text||'').replace(/\u00a0/g,' ').replace(/\r/g,'');var re=/Tiražas\s+(\d+)([\s\S]*?)(?=Tiražas\s+\d+|$)/gi,m,rows=[];while((m=re.exec(text))){var draw=Number(m[1]),b=m[2],dm=b.match(/Žaidimo\s+data\s*:\s*(\d{4}-\d{2}-\d{2})/i),mainRaw=field(b,'Pagrindiniai\\s+skaičiai',['Papildomi\\s+skaičiai','Auksinis\\s+skaičius','Lietuvoje laimėti prizai']),extraRaw=field(b,'Papildomi\\s+skaičiai',['Auksinis\\s+skaičius','Lietuvoje laimėti prizai']),goldRaw=field(b,'Auksinis\\s+skaičius',['Lietuvoje laimėti prizai','Žaidimas']);var mc=splitExact(mainRaw,6),ec=splitExact(extraRaw,2),g=(goldRaw.match(/\d{1,2}/)||[''])[0];rows.push({draw:draw,date:dm?dm[1]:'',main:mc.length?mc[0]:[],extra:ec.length?ec[0]:[],gold:g,status:(dm&&mc.length&&ec.length&&g)?'OK':'TIKRINTI'});}return rows;}
function render(rows){if(!rows.length){result.innerHTML='';setStatus('Mygtukas veikia, bet tekste neradau žodžio „Tiražas“ su numeriu.','err');return;}var h='<b>Rasta tiražų: '+rows.length+'</b><div class="scroll"><table><tr><th>Tiražas</th><th>Data</th><th>Pagrindiniai</th><th>Papildomi</th><th>Auksinis</th><th>Būsena</th></tr>';for(var i=0;i<rows.length;i++){var r=rows[i];h+='<tr><td>'+r.draw+'</td><td>'+r.date+'</td><td>'+r.main.join(' ')+'</td><td>'+r.extra.join(' ')+'</td><td>'+r.gold+'</td><td>'+r.status+'</td></tr>';}h+='</table></div>';result.innerHTML=h;setStatus('Valymas atliktas. Rasta '+rows.length+' tiražų.','ok');}
document.getElementById('cleanBtn').addEventListener('click',function(){try{setStatus('Mygtukas paspaustas. Apdorojamas tekstas...','');render(parse(src.value));}catch(e){setStatus('Programos klaida: '+e.message,'err');}});
document.getElementById('clearBtn').addEventListener('click',function(){src.value='';result.innerHTML='';setStatus('Įvesties langas išvalytas.','ok');});
})();
</script></body></html>
